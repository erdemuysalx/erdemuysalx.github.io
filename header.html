<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="color-scheme" content="dark light">
	<title>{{TITLE}}</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			background-color: #282A36;
			font-family: sans-serif, Monaco, Lucida Console, Liberation Mono, DejaVu Sans Mono, Bitstream Vera Sans Mono, Courier New, monospace, serif;
			max-width: 650px;
			line-height: 1.5rem;
			margin: 0 auto;
			padding: 1rem;
			word-wrap: break-word;
		}

		blockquote {
			border-left: 2px solid;
			padding-left: 0.5rem;
		}

		code {
			font-family: monospace;
			background-color: #44475A;
			color: #ffffff;
			border-radius: .2rem;
			padding: .1rem;
		}

		pre {
			border: 2px solid;
			padding: .5rem;
			overflow: auto;
		}

		pre:has(code) {
			background-color: #44475A;
			color: #ffffff;
			border: 2px solid #f9f9f9;
			border-radius: .2rem;
			padding: .5rem;
		}

		table {
			text-align: left;
			width: 100%;
		}

		img {
			max-width: 100%;
		}

		a {
			cursor: pointer;
			color: #bd93f9;
			text-decoration: none;
			border-bottom: 1px solid #bd93f9;
		}

		a:hover {
			background-color: #bd93f9;
			color: #ffffff;
			border-bottom: 1px solid #bd93f9
		}

		h2 {
			background-color: #bd93f9;
			color: #ffffff;
			display: inline-block;
			margin-bottom: 0.0rem;
			margin-top: 0.0rem;
			padding: 0.2rem 0.5rem;
		}

		#logo a {
			border-bottom: none;
		}

		#menu a {
			border-bottom: none;
		}

		.posts,
		#menu ul {
			list-style: none;
			padding: 0;
		}

		#menu li {
			display: inline-block;
			margin-right: 10px;
		}

		.posts li {
			margin-bottom: 0.5rem;
		}

		.posts li span {
			display: block;
			font-size: 90%;
		}
	</style>
</head>

<body>
	<header>
		<h1 id="logo"><a href="/" aria-label="Go to the homepage">~erdo.dev</a></h1>
		<nav id="menu">
			<ul>
				<li><a href="/">Home</a></li>
				<li><a href="/posts">Posts</a></li>
				<li><a href="/projects">Projects</a></li>
			</ul>
		</nav>
	</header>
	<hr>
